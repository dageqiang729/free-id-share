<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>后台管理 · 环球免费ID</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #f1f5f9;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 1.5rem;
      color: #1e293b;
    }
    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 998;
    }
    .login-box {
      background: white;
      padding: 2rem;
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      width: 400px;
      max-width: 90vw;
    }
    .login-box h2 { margin-bottom: 1.5rem; color:#0f172a; text-align:center; }
    .login-box label { display:block; margin-bottom:0.3rem; font-weight:600; color:#334155; font-size:0.85rem; }
    .login-box input {
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      border: 1px solid #dce3eb;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .login-box button {
      width: 100%;
      padding: 0.7rem;
      border-radius: 0.8rem;
      background: #2563eb;
      color: white;
      border: none;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
    }
    .login-box .hint { font-size:0.7rem; color:#94a3b8; text-align:center; margin-top:0.5rem; }
    .login-box .hint a { color:#2563eb; }
    .login-error { color: #dc2626; font-size: 0.8rem; margin-top: 0.5rem; display: none; text-align:center; }
    .logout-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 600;
      z-index: 100;
      display: none;
    }
    .admin-container {
      max-width: 1500px;
      margin: 0 auto;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.1);
      padding: 2rem;
      display: none;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .admin-header h1 { font-size:1.8rem; display:flex; align-items:center; gap:0.5rem; color:#0f172a; }
    .admin-header h1 i { color:#2563eb; }
    .header-btns { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .save-btn,.export-btn,.import-btn {
      color:white; border:none; padding:0.7rem 1.5rem; border-radius:2rem;
      font-weight:700; cursor:pointer; display:flex; align-items:center; gap:0.5rem; font-size:0.9rem;
    }
    .save-btn { background:#2563eb; }
    .save-btn:hover { background:#1d4ed8; }
    .export-btn { background:#10b981; }
    .export-btn:hover { background:#059669; }
    .import-btn { background:#f59e0b; }
    .import-btn:hover { background:#d97706; }
    .tabs { display:flex; gap:0.5rem; margin-bottom:1.8rem; flex-wrap:wrap; }
    .tab-btn {
      padding:0.6rem 1.4rem; border-radius:2rem; border:1px solid #dce3eb; background:white;
      font-weight:600; color:#475569; cursor:pointer; display:flex; align-items:center; gap:0.4rem; font-size:0.9rem;
    }
    .tab-btn.active { background:#2563eb; color:white; border-color:#2563eb; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem; }
    .section-header h2 { font-size:1.3rem; color:#0f172a; }
    .add-btn {
      background:#10b981; color:white; border:none; padding:0.5rem 1.3rem; border-radius:2rem;
      font-weight:600; cursor:pointer; display:flex; align-items:center; gap:0.4rem; font-size:0.85rem;
    }
    .add-btn:hover { background:#059669; }
    .table-wrapper { overflow-x:auto; border-radius:1rem; border:1px solid #e2e8f0; }
    table { width:100%; border-collapse:collapse; background:white; font-size:0.9rem; }
    th { background:#f8fafc; padding:0.9rem 0.8rem; text-align:left; font-weight:650; color:#334155; border-bottom:2px solid #e2e8f0; white-space:nowrap; }
    td { padding:0.7rem 0.8rem; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    tr:hover td { background:#fafcff; }
    .icon-upload-cell { display:flex; align-items:center; gap:0.8rem; min-width:280px; }
    .icon-preview-img {
      width:48px; height:48px; border-radius:0.8rem; object-fit:contain;
      background:#f8fafc; border:1px solid #e2e8f0; display:flex; align-items:center; justify-content:center;
      font-size:1.8rem; color:#1e3a8a; overflow:hidden; flex-shrink:0;
    }
    .icon-preview-img img { width:100%; height:100%; object-fit:contain; }
    .upload-btn-wrapper { display:flex; flex-direction:column; gap:0.3rem; }
    .upload-btn {
      background:#f1f5f9; border:1px dashed #94a3b8; padding:0.4rem 0.9rem; border-radius:0.6rem;
      cursor:pointer; font-size:0.75rem; color:#475569; display:inline-flex; align-items:center; gap:0.3rem;
    }
    .upload-btn:hover { background:#e2e8f0; }
    .icon-url-input { width:150px; padding:0.4rem 0.6rem; border-radius:0.5rem; border:1px solid #dce3eb; font-size:0.75rem; }
    .clear-icon-btn { background:transparent; border:none; color:#94a3b8; cursor:pointer; font-size:0.75rem; }
    .clear-icon-btn:hover { color:#dc2626; }
    input[type="text"] {
      width:100%; padding:0.5rem 0.7rem; border-radius:0.7rem; border:1px solid #dce3eb;
      font-size:0.85rem; font-family:inherit; background:#ffffff;
    }
    input[type="text"]:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.08); }
    .action-btns { display:flex; gap:0.4rem; }
    .icon-btn {
      background:transparent; border:1px solid #e2e8f0; padding:0.4rem 0.6rem; border-radius:0.6rem;
      cursor:pointer; color:#64748b; font-size:0.85rem;
    }
    .icon-btn:hover { background:#f1f5f9; }
    .delete-btn:hover { background:#fee2e2; color:#dc2626; border-color:#fecaca; }
    .toast {
      position:fixed; bottom:2rem; right:2rem; background:#0f172a; color:white;
      padding:0.8rem 1.5rem; border-radius:2rem; font-weight:500; opacity:0; pointer-events:none;
      transition:opacity 0.3s; z-index:1100;
    }
    .toast.show { opacity:1; }
    .saving-overlay {
      position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:1000;
      display:none; align-items:center; justify-content:center; font-size:1.5rem; font-weight:700; color:#2563eb;
    }
    @media (max-width:700px) {
      .admin-container { padding:1.2rem; }
      .icon-upload-cell { flex-wrap:wrap; }
    }
  </style>
</head>
<body>
  <!-- 登录界面 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2><i class="fas fa-lock"></i> 后台登录</h2>
      <label>管理密码</label>
      <input type="password" id="loginPassword" placeholder="请输入管理密码">
      <label>GitHub Token</label>
      <input type="password" id="loginToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <div class="hint"><a href="https://github.com/settings/tokens" target="_blank">获取Token</a> | 需勾选 <b>repo</b> 权限</div>
      <button onclick="login()">登 录</button>
      <div class="login-error" id="loginError">密码错误或Token无效</div>
    </div>
  </div>

  <button class="logout-btn" id="logoutBtn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
  <div class="saving-overlay" id="savingOverlay">正在保存到 GitHub...</div>

  <div class="admin-container" id="adminContainer">
    <div class="admin-header">
      <h1><i class="fas fa-tools"></i> 后台数据管理</h1>
      <div class="header-btns">
        <button class="export-btn" onclick="exportData()"><i class="fas fa-download"></i> 导出备份</button>
        <button class="import-btn" onclick="document.getElementById('importFile').click()"><i class="fas fa-upload"></i> 导入恢复</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <button class="save-btn" onclick="saveToGitHub()"><i class="fab fa-github"></i> 保存到 GitHub</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('free')"><i class="fas fa-flag"></i> 免费共享ID</button>
      <button class="tab-btn" onclick="switchTab('rental')"><i class="fas fa-gamepad"></i> 游戏租用</button>
      <button class="tab-btn" onclick="switchTab('premium')"><i class="fas fa-crown"></i> 独享账号</button>
    </div>
    <div id="tab-free" class="tab-content active">
      <div class="section-header"><h2>🌍 免费共享账号列表</h2><button class="add-btn" onclick="addFreeRow()"><i class="fas fa-plus"></i> 新增国家</button></div>
      <div class="table-wrapper"><table><thead><tr><th>国家</th><th>图标</th><th>账号ID</th><th>密码</th><th>备注</th><th style="width:80px;">操作</th></tr></thead><tbody id="freeTableBody"></tbody></table></div>
    </div>
    <div id="tab-rental" class="tab-content">
      <div class="section-header"><h2>🎮 游戏租用列表</h2><button class="add-btn" onclick="addRentalRow()"><i class="fas fa-plus"></i> 新增游戏</button></div>
      <div class="table-wrapper"><table><thead><tr><th>游戏名</th><th>图标</th><th>价格</th><th>描述</th><th>链接</th><th style="width:80px;">操作</th></tr></thead><tbody id="rentalTableBody"></tbody></table></div>
    </div>
    <div id="tab-premium" class="tab-content">
      <div class="section-header"><h2>👑 独享账号列表</h2><button class="add-btn" onclick="addPremiumRow()"><i class="fas fa-plus"></i> 新增国家</button></div>
      <div class="table-wrapper"><table><thead><tr><th>国家</th><th>图标</th><th>价格</th><th>链接</th><th style="width:80px;">操作</th></tr></thead><tbody id="premiumTableBody"></tbody></table></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const OWNER = 'dageqiang729';
    const REPO = 'free-id-share';
    const ADMIN_PASSWORD = 'admin123';

    let token = '';
    let freeData = [], rentalData = [], premiumData = [];
    let uploadedImages = {};

    // ========== 登录 ==========
    async function login() {
      const pwd = document.getElementById('loginPassword').value;
      const tk = document.getElementById('loginToken').value.trim();
      
      if (pwd !== ADMIN_PASSWORD) {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = '密码错误';
        return;
      }
      if (!tk.startsWith('ghp_')) {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = 'Token 格式不正确，应以 ghp_ 开头';
        return;
      }

      // 验证 Token 是否有效
      const testUrl = `https://api.github.com/repos/${OWNER}/${REPO}`;
      try {
        const res = await fetch(testUrl, { headers: { 'Authorization': `token ${tk}` } });
        if (!res.ok) {
          document.getElementById('loginError').style.display = 'block';
          document.getElementById('loginError').textContent = 'Token 无效或无权限访问仓库';
          return;
        }
      } catch(e) {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = '网络错误，请检查 Token';
        return;
      }

      token = tk;
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('adminContainer').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'block';
      initAdmin();
    }

    function logout() {
      token = '';
      document.getElementById('adminContainer').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'none';
      document.getElementById('loginOverlay').style.display = 'flex';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginToken').value = '';
      document.getElementById('loginError').style.display = 'none';
    }

    // ========== 数据加载 ==========
    function getDefaultData() {
      return {
        free: [
          { country:"中国", icon:"fas fa-flag", id:"cn.free@qq.com", password:"Beijing2024!", extra:"国内可用" },
          { country:"美国", icon:"fas fa-flag-usa", id:"us.test@freemail.com", password:"FreeUS2024!", extra:"VPN可用" },
          { country:"日本", icon:"fas fa-flag", id:"jp.demo@jpconnect.jp", password:"Tokyo#2024", extra:"地域限定" },
          { country:"韩国", icon:"fas fa-flag", id:"kr.test@kakao.co.kr", password:"Seoul2024*", extra:"验证可用" },
          { country:"德国", icon:"fas fa-flag", id:"de.free@bundesnetz.de", password:"Berlin#2024", extra:"EU节点" }
        ],
        rental: [
          { game:"我的世界", icon:"fas fa-cube", price:"¥8/天", desc:"Java版·正版", link:"#" },
          { game:"泰拉瑞亚", icon:"fas fa-tree", price:"¥6/天", desc:"含灾厄模组", link:"#" }
        ],
        premium: [
          { country:"中国", icon:"fas fa-flag", price:"¥25/月", link:"#" },
          { country:"美国", icon:"fas fa-flag-usa", price:"¥29/月", link:"#" },
          { country:"日本", icon:"fas fa-flag", price:"¥35/月", link:"#" }
        ],
        images: {}
      };
    }

    async function loadFromGitHub() {
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/data.json`;
      try {
        const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
        if (!res.ok) throw new Error('加载失败');
        const json = await res.json();
        const content = JSON.parse(atob(json.content));
        freeData = content.free || [];
        rentalData = content.rental || [];
        premiumData = content.premium || [];
        uploadedImages = content.images || {};
        return true;
      } catch(e) {
        const def = getDefaultData();
        freeData = def.free;
        rentalData = def.rental;
        premiumData = def.premium;
        uploadedImages = def.images;
        return false;
      }
    }

    async function saveToGitHub() {
      if (!token) { showToast('❌ 请先登录'); return; }
      document.getElementById('savingOverlay').style.display = 'flex';
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/data.json`;
      
      const content = JSON.stringify({
        free: freeData, rental: rentalData, premium: premiumData,
        images: uploadedImages, updated_at: new Date().toISOString()
      }, null, 2);

      const body = {
        message: '更新数据 ' + new Date().toLocaleString(),
        content: btoa(unescape(encodeURIComponent(content)))
      };

      try {
        let sha = '';
        try {
          const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
          if (getRes.ok) sha = (await getRes.json()).sha;
        } catch(e) {}
        if (sha) body.sha = sha;

        const res = await fetch(url, {
          method: 'PUT',
          headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (res.ok) showToast('✅ 已保存到 GitHub！等1-2分钟前端更新');
        else showToast('❌ 保存失败: ' + ((await res.json()).message || '未知错误'));
      } catch(e) {
        showToast('❌ 网络错误: ' + e.message);
      }
      document.getElementById('savingOverlay').style.display = 'none';
    }

    function exportData() {
      const data = { free: freeData, rental: rentalData, premium: premiumData, images: uploadedImages };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'backup_' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
      showToast('✅ 备份文件已下载');
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (data.free) freeData = data.free;
          if (data.rental) rentalData = data.rental;
          if (data.premium) premiumData = data.premium;
          if (data.images) uploadedImages = data.images;
          renderAll();
          showToast('✅ 已导入，请点"保存到 GitHub"');
        } catch(err) { showToast('❌ 文件格式错误'); }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // ========== 图标管理 ==========
    function handleImageUpload(event, table, index) {
      const file = event.target.files[0];
      if (!file) return;
      if (file.size > 500 * 1024) { showToast('图片不能超过500KB'); return; }
      const reader = new FileReader();
      reader.onload = function(e) {
        const key = `${table}-${index}`;
        uploadedImages[key] = e.target.result;
        updateIconPreview(table, index);
        if (table === 'free') freeData[index].icon = e.target.result;
        else if (table === 'rental') rentalData[index].icon = e.target.result;
        else if (table === 'premium') premiumData[index].icon = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function clearUploadedImage(table, index) {
      delete uploadedImages[`${table}-${index}`];
      const di = table === 'rental' ? 'fas fa-gamepad' : 'fas fa-flag';
      if (table === 'free') freeData[index].icon = di;
      else if (table === 'rental') rentalData[index].icon = di;
      else if (table === 'premium') premiumData[index].icon = di;
      updateIconPreview(table, index);
    }

    function handleIconUrlChange(event, table, index) {
      const val = event.target.value;
      if (table === 'free') freeData[index].icon = val;
      else if (table === 'rental') rentalData[index].icon = val;
      else if (table === 'premium') premiumData[index].icon = val;
      updateIconPreview(table, index);
    }

    function updateIconPreview(table, index) {
      const key = `${table}-${index}`;
      const preview = document.getElementById(`icon-preview-${key}`);
      if (!preview) return;
      const uploadedImg = uploadedImages[key];
      let icon = '';
      if (table === 'free') icon = freeData[index]?.icon;
      else if (table === 'rental') icon = rentalData[index]?.icon;
      else if (table === 'premium') icon = premiumData[index]?.icon;
      if (uploadedImg || (icon && (icon.startsWith('data:image') || icon.startsWith('http')))) {
        preview.innerHTML = `<img src="${uploadedImg || icon}" alt="图标">`;
      } else if (icon && icon.startsWith('fa')) {
        preview.innerHTML = `<i class="${icon}"></i>`;
      } else {
        preview.innerHTML = `<i class="fas fa-flag"></i>`;
      }
    }

    // ========== 表格 ==========
    function bindInputs(table) {
      document.querySelectorAll(`input[data-table="${table}"]`).forEach(input => {
        input.removeEventListener('input', inputHandler);
        input.addEventListener('input', inputHandler);
      });
    }
    function inputHandler(e) {
      const field = e.target.dataset.field, idx = parseInt(e.target.dataset.idx), table = e.target.dataset.table, value = e.target.value;
      if (table === 'free') freeData[idx][field] = value;
      else if (table === 'rental') rentalData[idx][field] = value;
      else if (table === 'premium') premiumData[idx][field] = value;
    }

    function deleteRow(table, index) {
      if (!confirm('确定删除吗？')) return;
      delete uploadedImages[`${table}-${index}`];
      const newImages = {};
      if (table === 'free') freeData.splice(index, 1);
      else if (table === 'rental') rentalData.splice(index, 1);
      else if (table === 'premium') premiumData.splice(index, 1);
      Object.keys(uploadedImages).forEach(k => {
        if (k.startsWith(table + '-')) {
          const oi = parseInt(k.split('-')[1]);
          if (oi < index) newImages[k] = uploadedImages[k];
          else if (oi > index) newImages[`${table}-${oi-1}`] = uploadedImages[k];
        }
      });
      uploadedImages = newImages;
      renderAll();
      showToast('已删除（记得保存）');
    }

    function addFreeRow() { freeData.push({ country:'新国家', icon:'fas fa-flag', id:'new@mail.com', password:'password', extra:'备注' }); renderAll(); }
    function addRentalRow() { rentalData.push({ game:'新游戏', icon:'fas fa-gamepad', price:'¥0/天', desc:'描述', link:'#' }); renderAll(); }
    function addPremiumRow() { premiumData.push({ country:'新国家', icon:'fas fa-flag', price:'¥0/月', link:'#' }); renderAll(); }

    function makeRow(table, idx) {
      const k = `${table}-${idx}`;
      return `<div class="icon-upload-cell">
        <div class="icon-preview-img" id="icon-preview-${k}"></div>
        <div class="upload-btn-wrapper">
          <label class="upload-btn"><i class="fas fa-upload"></i> 上传<input type="file" accept="image/*" style="display:none" onchange="handleImageUpload(event,'${table}',${idx})"></label>
          <input type="text" class="icon-url-input" value="" placeholder="图标类名/URL" oninput="handleIconUrlChange(event,'${table}',${idx})" id="icon-input-${k}">
          <button class="clear-icon-btn" onclick="clearUploadedImage('${table}',${idx})"><i class="fas fa-times"></i> 清除</button>
        </div>
      </div>`;
    }

    function renderAll() {
      document.getElementById('freeTableBody').innerHTML = freeData.map((item, idx) => {
        const k = `free-${idx}`;
        return `<tr>
          <td><input type="text" value="${item.country||''}" data-field="country" data-idx="${idx}" data-table="free"></td>
          <td>${makeRow('free', idx)}</td>
          <td><input type="text" value="${item.id||''}" data-field="id" data-idx="${idx}" data-table="free"></td>
          <td><input type="text" value="${item.password||''}" data-field="password" data-idx="${idx}" data-table="free"></td>
          <td><input type="text" value="${item.extra||''}" data-field="extra" data-idx="${idx}" data-table="free"></td>
          <td><button class="icon-btn delete-btn" onclick="deleteRow('free',${idx})"><i class="fas fa-trash"></i></button></td>
        </tr>`;
      }).join('');
      freeData.forEach((_, i) => { updateIconPreview('free', i); document.getElementById(`icon-input-free-${i}`).value = freeData[i].icon || ''; });

      document.getElementById('rentalTableBody').innerHTML = rentalData.map((item, idx) => {
        const k = `rental-${idx}`;
        return `<tr>
          <td><input type="text" value="${item.game||''}" data-field="game" data-idx="${idx}" data-table="rental"></td>
          <td>${makeRow('rental', idx)}</td>
          <td><input type="text" value="${item.price||''}" data-field="price" data-idx="${idx}" data-table="rental"></td>
          <td><input type="text" value="${item.desc||''}" data-field="desc" data-idx="${idx}" data-table="rental"></td>
          <td><input type="text" value="${item.link||''}" data-field="link" data-idx="${idx}" data-table="rental"></td>
          <td><button class="icon-btn delete-btn" onclick="deleteRow('rental',${idx})"><i class="fas fa-trash"></i></button></td>
        </tr>`;
      }).join('');
      rentalData.forEach((_, i) => { updateIconPreview('rental', i); document.getElementById(`icon-input-rental-${i}`).value = rentalData[i].icon || ''; });

      document.getElementById('premiumTableBody').innerHTML = premiumData.map((item, idx) => {
        const k = `premium-${idx}`;
        return `<tr>
          <td><input type="text" value="${item.country||''}" data-field="country" data-idx="${idx}" data-table="premium"></td>
          <td>${makeRow('premium', idx)}</td>
          <td><input type="text" value="${item.price||''}" data-field="price" data-idx="${idx}" data-table="premium"></td>
          <td><input type="text" value="${item.link||''}" data-field="link" data-idx="${idx}" data-table="premium"></td>
          <td><button class="icon-btn delete-btn" onclick="deleteRow('premium',${idx})"><i class="fas fa-trash"></i></button></td>
        </tr>`;
      }).join('');
      premiumData.forEach((_, i) => { updateIconPreview('premium', i); document.getElementById(`icon-input-premium-${i}`).value = premiumData[i].icon || ''; });

      bindInputs('free'); bindInputs('rental'); bindInputs('premium');
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      const idx = tabName === 'free' ? 1 : tabName === 'rental' ? 2 : 3;
      document.querySelector(`.tab-btn:nth-child(${idx})`).classList.add('active');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    async function initAdmin() {
      await loadFromGitHub();
      renderAll();
    }

    window.login = login;
    window.logout = logout;
    window.switchTab = switchTab;
    window.addFreeRow = addFreeRow;
    window.addRentalRow = addRentalRow;
    window.addPremiumRow = addPremiumRow;
    window.deleteRow = deleteRow;
    window.saveToGitHub = saveToGitHub;
    window.exportData = exportData;
    window.importData = importData;
    window.handleImageUpload = handleImageUpload;
    window.clearUploadedImage = clearUploadedImage;
    window.handleIconUrlChange = handleIconUrlChange;
  </script>
</body>
</html>
